<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MESAS PACHA</title>
    <style>
/* ===== ESTILOS GENERALES Y ESTRUCTURA (SIN CAMBIOS) ===== */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #2b2b2b 0%, #000000 100%);
    color: #fff;
}

/* Contenedor relativo para posicionar la imagen */
.custom-header-container {
    position: relative;
    height: 60px; /* altura más delgada para desktop */
}

/* Header fijo, distinto al original */
.custom-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 80px; /* header más delgado */
    background-color: rgba(51, 59, 71, 0.8); /* azul semitransparente */
    z-index: 20;
    display: flex;
    align-items: center;
    padding: 0 15px;
    justify-content: space-between;
}

/* Imagen encima del header */
.top-image {
    position: absolute;
    top: -20px; /* sobresale menos con header más delgado */
    left: 50%;
    transform: translateX(-50%);
    width: 120px; /* más pequeña para celulares */
    height: auto;
    z-index: 30; /* encima del header */
}

/* Ícono del menú */
.menu-icon {
    width: 55px; /* más pequeño */
    height: 55px;
    cursor: pointer;
    position: absolute; 
    left: 15px;
    top: 60%;
    transform: translateY(-50%);
}
.mes-acordeon {
    margin-bottom: 36px;
}

/* =========================
   HEADER DEL MES
   ========================= */
.separador-mes {
    cursor: pointer;
    user-select: none;
    text-align: center;
    margin: 50px 0 28px;
}

.separador-mes span {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    padding: 14px 42px;

    font-weight: 700;
    letter-spacing: 3px;
    font-size: 18px;

    color: #0b1c26; /* negro suave */

    background: linear-gradient(
        135deg,
        #dff3ff,
        #b8e7ff,
        #8fd3ff
    );

    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 10px 28px rgba(143,211,255,0.45),
        0 4px 10px rgba(0,0,0,0.25);

    transition: all 0.3s ease;
}

/* HOVER */
.separador-mes:hover span {
    transform: translateY(-2px);
    background: linear-gradient(
        135deg,
        #e9f8ff,
        #c7eeff,
        #9ad9ff
    );
    box-shadow:
        0 14px 34px rgba(143,211,255,0.6),
        0 6px 14px rgba(0,0,0,0.35);
}

/* =========================
   ESTADO ABIERTO
   ========================= */
.separador-mes.abierto span {
    background: linear-gradient(
        135deg,
        #ffffff,
        #dff3ff,
        #b8e7ff
    );
    color: #000;

    box-shadow:
        0 16px 40px rgba(143,211,255,0.7),
        0 8px 18px rgba(0,0,0,0.45);
}

/* =========================
   CONTENIDO DEL MES
   ========================= */
.mes-contenido {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transform: translateY(-8px);

    transition:
        max-height 0.5s ease,
        opacity 0.35s ease,
        transform 0.35s ease;
}

.mes-contenido.abierto {
    max-height: 6000px;
    opacity: 1;
    transform: translateY(0);
    margin-top: 20px;
}


/* ===== Ajustes para pantallas pequeñas ===== */
@media (max-width: 600px) {
    .custom-header-container {
        height: 50px;
    }

    .custom-header {
        height: 60px;
        padding: 0 10px;
    }

    .top-image {
        width: 100px;
        top: -20px;
    }

    .menu-icon {
        width: 45px;
        height: 45px;
        left: 10px;
    }
}


/* ✅ Ajuste para el ícono */
.menu-icon {
    width: 75px;
    height: 75px;
    cursor: pointer;
    /* ✅ Nuevo: Mover el ícono a la izquierda (o donde se requiera) */
    margin-right: auto; 
    /* ✅ Nuevo: Ajustar su posición vertical si es necesario */
    position: absolute; 
    left: 20px; /* Distancia del borde izquierdo */
    top: 40%;
    transform: translateY(-50%);
}



main { padding-top: 60px; }
.contenido { padding: 20px; }

/* ===== ESTILOS DE GRID (SIN CAMBIOS) ===== */
.areas-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
}

.area-section {
    margin-bottom: 50px;
}
.area-section h2 {
    margin-bottom: 15px;
    text-align: center;
    font-size: 1.5em;
    font-weight: bold;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

.image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.image-grid img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.image-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

.img-wrapper {
    position: relative;
}
.img-number {
    position: absolute;
    top: 5px;
    left: 5px;
    font-family: 'Walter Turncoat', cursive;
    font-size: 1.1em;
    font-weight: bold;
    color: #ffffff;
    background: linear-gradient(135deg, #1a1a1a, #333333);
    border: 2px solid #303030;
    padding: 3px 6px;
    border-radius: 6px;
    text-align: center;
    box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

.area-divider {
    position: relative;
    margin-top: 20px;
    height: 3px;
    background: #555;
}

.area-divider::before {
    content: "";
    position: absolute;
    top: -42px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    z-index: 10;
}

/* ==========================================================
    ✅ RESPONSIVIDAD (Ajustes para el ícono de menú)
    ========================================================== */

/* Pantallas medianas */
@media (max-width: 768px) {
    header { height: 70px; padding: 0 15px; }
    .top-image { width: 110px; top: -18px; }

    /* ✅ Ajuste del tamaño del ícono */
    .menu-icon { 
        width: 60px; 
        height: 60px; 
        left: 15px; /* Ajustar posición lateral */
    }

    .areas-container { grid-template-columns: 1fr; gap: 25px; } 
    .image-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } 
    main { padding-top: 140px; }
}


/* Pantallas pequeñas (celulares) */
@media (max-width: 480px) {
    header { height: 60px; padding: 0 10px; }
    .top-image { width: 90px; top: -12px; }

    /* ✅ Ajuste CLAVE para el ícono en móviles */
    .menu-icon { 
        width: 50px; 
        height: 50px; 
        left: 10px; /* Más cerca de la esquina */
    }

    .areas-container { grid-template-columns: 1fr; gap: 25px; }
    .image-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 4px;
    } 

    main { padding-top: 20px; }

    .img-number {
        font-size: 0.7em;
        padding: 1px 3px;
        border: 1px solid #303030;
        border-radius: 3px;
    }
}

.sidebar {
    height: 100%;
    width: 250px; /* Definimos el ancho visible fijo */
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    padding-top: 60px;
    box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);

    /* 🌟 CLAVE 1: TRASLADAR FUERA DE LA VISTA 🌟 */
    transform: translateX(-100%); /* Desplaza el menú 100% de su ancho hacia la izquierda (oculto) */

    /* 🌟 CLAVE 2: TRANSICIÓN PARA EL EFECTO DE DESLIZAMIENTO 🌟 */
    transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* Transición con efecto elástico para entrada y salida */
}

/* Estilos BASE de los enlaces */
.sidebar a {
    padding: 8px 8px 8px 32px;
    text-decoration: none;
    font-size: 25px;
    color: #818181;
    display: block;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;

    /* 1. Establecer la transición para el giro */
    transition: 0.3s ease-in-out; 

    /* 2. Establecer el punto de origen del giro (opcional, para que gire desde el centro) */
    transform-origin: center left; /* Gira sobre el punto inicial izquierdo */
}

/* 🌟 EFECTO HOVER CON GIRO 🌟 */
.sidebar a:hover {
    color: #f1f1f1; /* Cambio de color más brillante */

    /* Gira el texto 2 grados. Puedes cambiar el valor (ej: 5deg) */
    transform: rotate(2deg) scale(1.05); /* Ligeramente rotado y agrandado */
}
/* Botón de cerrar (x) (Mantener) */
.sidebar .close-btn {
    position: absolute;
    top: 0;
    right: 25px;
    font-size: 36px;
    margin-left: 50px;
}

/* Título del menú (Mantener) */
.sidebar .menu-title {
    color: white;
    padding: 8px 8px 20px 32px;
     font-family: 'Walter Turncoat', cursive;
    font-size: 25px;
    border-bottom: 2px solid #333;
    margin-bottom: 20px;
}

/* Estilo para mostrar el sidebar */
.sidebar.open {
    /* 🌟 CLAVE 3: REGRESAR A LA POSICIÓN ORIGINAL 🌟 */
    transform: translateX(0); /* Lo devuelve a su posición visible (0) */
}
/* Añade o modifica este bloque en tu archivo style.css */

.sidebar a i {
    /* Dar un margen derecho al ícono para separarlo del texto */
    margin-right: 10px; 

    /* 🌟 CLAVE: ASIGNAR UN COLOR VIBRANTE SOLO AL ÍCONO 🌟 */
    color: #d2d7cc; /* Color cian vibrante. ¡Cámbialo al que más te guste! */

    /* Aseguramos que el color del ícono no cambie en el hover (opcional) */
    transition: none; 
}



/* Estilos para el overlay (el fondo oscuro) */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7); /* Fondo oscuro semitransparente */
    z-index: 999; 
    /* Cambiamos display:none por opacity y visibility para que la transición funcione */
    visibility: hidden; 
    opacity: 0;
    transition: opacity 0.5s ease-in-out, visibility 0s linear 0.5s; /* La visibilidad cambia al terminar la opacidad */
}

#overlay.active {
    visibility: visible;
    opacity: 1;
    transition: opacity 0.5s ease-in-out; /* Sin retraso al activarse */
}

/* Asegurar que el icono del menú sea visible y clicable (Mantener) */
header {
    z-index: 1001;
}

.menu-icon {
    cursor: pointer;
}
/* --- Estilos base del Modal --- */
.comprobante-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8); /* Oscuro para destacar el comprobante */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
/* Nuevo CSS para el contenedor del cuerpo */
.comprobante-body {
    display: flex;
    gap: 20px; /* Espacio entre los dos bloques de transacción */
    flex-wrap: nowrap; /* Permite que los bloques se envuelvan en pantallas pequeñas */
}
.nota {
    width: 100%;
    text-align: center;
    margin-top: 20px;
}

.comprobante-content {
    background: radial-gradient(circle at center, #2b2b2b 0%, #000000 100%);
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    max-width: 750px;
    width: 90%;
    max-height: 75vh;
    overflow-y: auto;
    font-family: 'Poppins', sans-serif; /* Fuente limpia */
}

/* --- Estilos del Encabezado --- */
.comprobante-header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    border-bottom: 2px solid #4CAF50; /* Línea verde de confirmación */
    padding-bottom: 15px;
}

.comprobante-header h2 {
    color: #ffffff; /* Verde de éxito */
    font-size: 1.8em;
    margin: 0;
}

.comprobante-header p {
    color: #ebebeb;
    font-size: 0.9em;
    font-weight: 600;
}

/* Botón de cerrar */
.close-comprobante {
    position: absolute;
    top: -10px;
    right: -10px;
    background: none;
    border: none;
    font-size: 1.8em;
    cursor: pointer;
    color: #ffffff;
}
.close-comprobante:hover {
    color: #ff0000; /* cambiar color al pasar el mouse */
}
/* Cuando hay solo una transacción, el bloque será más estrecho */
.single-transaction {
    max-width: 420px;      /* Ajusta a tu gusto (350–450px recomendable) */
    margin-left: auto;
    margin-right: auto;
}


/* --- Estilos del Cuerpo (Detalle de Transacciones) --- */
.transaction-block {
    margin-bottom: 20px;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 8px;
    background-color: #f9f9f9;
    flex: 1 1 5%; /* Crece, se encoge, y base de 45% del ancho */
        min-width: 300px; /* Asegura que no se hagan demasiado pequeños en dispositivos grandes */
    }
/* ✅ NUEVO ESTILO: Bloque de Consumo (Tragos/Combo) */
.consumption-block {
    /* Toma todas las propiedades de .transaction-block, solo necesita cambiar el orden */
    order: -1; 
}
.transaction-block h4 {
    margin-top: 0;
    color: #333;
    font-size: 1.1em;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 5px;
    margin-bottom: 10px;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.95em;
    color: #333;
}

.detail-row span:first-child {
    font-weight: 500;
}

.detail-row .value {
    font-weight: 600;
    text-align: right;
}

.detail-row .monto {
    color: #007bff; /* Azul para el monto */
    font-size: 1.05em;
}

.transaction-block p {
    font-size: 0.9em;
    color: #666;
    margin: 5px 0 0 0;
}

.divider {
    height: 1px;
    background-color: #ddd;
    margin: 10px 0;
}

.nota {
    text-align: center;
    font-size: 0.8em;
    color: #888;
    margin-top: 20px;
    border-top: 1px solid #eee;
    padding-top: 10px;
}
/* --- Ajustes completos para CELULARES --- */
@media (max-width: 600px) {

    /* Transacciones una debajo de otra */
    .comprobante-body {
        flex-direction: column;
        flex-wrap: nowrap;
        gap: 15px;
    }

    .transaction-block {
        min-width: 90%;
        flex: 1 1 100%;
    }

    /* Modal más angosto */
    .comprobante-content {
        max-width: 350px;
        width: 95%;
        padding: 20px;
        margin-top: 20px; /* Ajuste fino */
    }

    /* Baja el modal un poco */
    .comprobante-modal {
        align-items: flex-start;
        padding-top: 60px;
    }
}
/* =====================================================
   AJUSTES CSS PARA HACER EL TOTAL ESTRECHO Y CENTRADO
   ===================================================== */

.total-container {
    margin-top: 20px;
    padding: 10px 15px; 
    border: 2px solid #570000; 
    border-radius: 8px;
    background-color: #e8f5e9; 

    /* CAMBIOS CLAVE: */
    width: fit-content; /* El ancho se ajusta al contenido (navegadores modernos) */
    max-width: 90%; /* Asegura que no se salga en pantallas muy pequeñas */
    margin-left: auto; /* Centrado horizontal (funciona con margin-right: auto) */
    margin-right: auto;
    /* FIN DE CAMBIOS CLAVE */
}

.total-row {
    /* Manteniendo los tamaños compactos que ya definimos */
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1em; 
    font-weight: 600; 
    color: #333;
    /* Quitamos el espacio para que los elementos estén juntos en la etiqueta estrecha */
    gap: 10px; 
}

.total-row span:first-child {
    color: #000000; 
    letter-spacing: 0.5px;
    font-size: 0.9em;
}

.total-value {
    font-size: 1.3em; 
    font-weight: 700;
     color: #007bff; /* Azul para el monto */
    /* Eliminamos el margin-left que ya no es necesario por el 'gap' */
    margin-left: 0; 
}

/* 1. Fondo del Modal (oscuro y semitransparente) */
.resumen-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.85); /* Fondo oscuro más intenso */
    display: flex;
    margin-top: 10px;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

/* 2. Contenido Principal del Modal */
.resumen-content {
    /* Usaremos un fondo degradado similar a tu body para mantener la estética oscura */
    background: radial-gradient(circle at center, #1c1e21 0%, #000000 100%);
    color: #f0f2f5; /* Texto principal claro */
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
    width: 90%;
    max-width: 800px;
    max-height: 85vh;
    overflow-y: auto;
    border: 1px solid #333;
}

/* 3. Encabezado */
.resumen-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #38ff4f; /* Línea azul de acento */
    padding-bottom: 10px;
    margin-bottom: 20px;
}

.resumen-header h2 {
    font-family: 'Poppins', sans-serif;
    color: #3a8dff; /* Azul elegante */
    margin: 0;
}

.close-resumen {
    background: none;
    border: none;
    color: #f0f2f5;
    font-size: 30px;
    cursor: pointer;
    transition: color 0.2s;
}

.close-resumen:hover {
    color: #ff6b6b; /* Rojo suave al pasar el ratón */
}

/* 4. Barra del Total Global (¡El más importante!) */
.resumen-total-bar {
background-color: #ffffff;
color: black;
padding: 8px 20px; 
border-radius: 8px;
margin-bottom: 25px;
max-width: 400px; /* Mantenemos el ancho estrecho */
margin-left: auto;
margin-right: auto;
display: flex;
justify-content: space-between;
font-weight: bold;
font-size: 1.3em; 
transition: transform 0.3s;
}
.resumen-total-bar:hover {
    transform: translateY(-2px); /* Pequeño efecto al pasar el ratón */
}

.resumen-total-bar .total-final {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.1em;
    /* 🛠️ CAMBIO CLAVE: Color azul para el monto */
    color: #3a8dff; /* Azul que combina con el encabezado */

    /* Si quieres que el monto sea un poco más grueso para destacar */
    font-weight: 900;
}

/* 5. Detalle de Ingresos por Cuenta */
.resumen-body h3 {
    color: #f0f2f5;
    margin-top: 0;
    border-left: 4px solid #45ff38; /* Línea azul */
    padding-left: 10px;
}

.resumen-bloque-cuenta {
background-color: #ffffff; /* Fondo de tarjeta más claro que el fondo */
padding: 15px;
border-radius: 8px;
margin-bottom: 15px;
box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);

/* Propiedades de ancho y centrado (¡Alineadas y limpias!) */
max-width: 90%;
width: 600px;
margin-left: auto;
margin-right: auto;
}

.resumen-cuenta-header {
display: flex;
justify-content: space-between;
/* border-bottom: 1px dashed #555; <--- ¡Eliminada! */
padding-bottom: 5px;
margin-bottom: 10px;
}

.resumen-cuenta-header h4 {
    color: #000000; /* Azul para el nombre de la cuenta */
    margin: 0;
    font-size: 1em;
}

.monto-total-cuenta {
    font-weight: bold;
    color: #000000;
    font-size: 1.1em;
}

.resumen-lista-tx {
    list-style: none;
    padding: 0;
    margin: 0;
}

.resumen-transaccion {
    display: flex;
    justify-content: space-between; /* Mantiene la separación entre ubicación y monto */
    padding: 5px 0;
    font-size: 0.9em;
}

.resumen-transaccion span:first-child {
color: #08454a;
font-style: italic;
/* 🛠️ CAMBIO CLAVE: Hace la letra más gruesa */
font-weight: bold; 
    /* También puedes usar un número: font-weight: 700; */

flex-basis: 80%; /* Puedes jugar con este valor (ej: 50%) */
white-space: nowrap; /* Evita que salte de línea */
}

.resumen-transaccion .monto-tx {
    font-weight: bold;
    font-size: 1.2em;
    color: #3a8dff; /* Verde para los montos individuales */
}

.nota {
    text-align: center;
    font-size: 0.8em;
    color: #888;
    margin-top: 20px;
    padding-top: 10px;
    border-top: 1px solid #333;
}
/* ==========================================================
   AJUSTES RESPONSIVOS PARA EL MODAL DE RESUMEN (< 600px)
   ========================================================== */
@media (max-width: 600px) {

    /* 1. Contenido Principal del Modal */
    .resumen-content {
        padding: 20px 15px; /* Reducir el relleno interno */
        width: 95%; /* Asegurar que ocupe casi todo el ancho disponible */
        max-width: none; /* Ignorar el límite de 800px para maximizar el uso */
    }

    /* 2. Total Global */
    .resumen-total-bar {
        padding: 6px 15px; /* Reducir el relleno para hacerlo más delgado aún */
        max-width: 90%; /* Ajustar el máximo para que encaje bien */
        font-size: 1.1em; /* Reducir el tamaño de la fuente principal */
    }

    .resumen-total-bar .total-final {
        font-size: 1em; /* Reducir el tamaño del monto final */
        font-weight: 700; /* Asegurar que siga siendo visible */
    }

    /* 3. Bloques de Cuenta (Tarjetas de Transacciones) */
    .resumen-bloque-cuenta {
        /* Permitir que ocupe todo el ancho del contenedor */
        max-width: 100%; 
        width: auto; /* Dejar que el ancho sea determinado por max-width/padding */
        margin-left: 0; 
        margin-right: 0; 
        padding: 10px; /* Reducir el relleno de la tarjeta */
    }

    /* 4. Encabezado de la Cuenta (Título y Total de la Cuenta) */
    .resumen-cuenta-header {
        /* Puede ser útil apilarlos si el nombre de la cuenta es muy largo */
        flex-direction: column; 
        align-items: flex-start;
    }

    .resumen-cuenta-header h4 {
        /* Asegurar que el nombre de la cuenta tenga espacio */
        margin-bottom: 5px; 
    }

    /* 5. Transacciones Individuales */
    .resumen-transaccion {
        /* Permitir que los elementos se envuelvan si es necesario, pero mantendremos el espacio */
        flex-wrap: nowrap;
        padding: 5px 0;
        font-size: 0.85em; /* Reducir ligeramente la fuente de la lista */
    }

    /* 6. Ajuste de ancho de la Ubicación [Area M-Mesa] */
    .resumen-transaccion span:first-child {
        /* Damos menos espacio al texto de ubicación para que el monto quepa */
        flex-basis: 60%;

/* --- Estilos Específicos para el Modal de Ocupación (Dashboard) --- */

/* ----------------- Resumen Global (3 Columnas) ----------------- */
.global-summary-block {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 10px;
    padding: 20px 0;
    margin-bottom: 20px;

}

.summary-item {

    flex-direction: column;
    align-items: center;
    text-align: center;
}

.summary-value {
    font-size: 2.5em;
    font-weight: bold;
    font-family: 'Montserrat', sans-serif;

}

.summary-label {
    font-size: 0.9em;
    color: #777;
    margin-top: 5px;
}

/* Colores de estado base (en caso de que los uses fuera de los gauges) */
.occupied-color { color: #dc3545; /* Rojo */ }
.libre-color { color: #28a745; /* Verde */ }
/* Añadir el nuevo color */
.low-occupation-color { color: #17a2b8; /* Cian/Azul */ }
.medium-occupation-color { color: #ffc107; /* Naranja/Amarillo */ }

/* ----------------- Grilla de Detalles por Área ----------------- */
.ocupacion-grid {
    /* Muestra los medidores en una cuadrícula flexible (responsivo) */
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 20px;
    justify-content: center;
    padding-bottom: 20px;
}

.area-gauge-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    border-radius: 10px;

    /* CAMBIOS AQUÍ */
    background-color: #222; /* Fondo oscuro */
    color: white; /* Texto blanco por defecto */

    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); /* Sombra más oscura */
    transition: transform 0.2s;
}

.area-gauge-block:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
}

.area-gauge-block h4 {
    margin: 0 0 10px 0;
    color: white; /* Aseguramos que el título sea blanco */
    font-size: 1.1em;
}

.gauge-info {
    margin: 2px 0;
    font-size: 0.85em;
    color: #ccc; /* Texto de la información en gris claro */
    text-align: center;
}

/* ----------------- Estilo del Medidor Circular (Gauge) ----------------- */

.area-gauge, .total-mesas-gauge {
    /* Define el tamaño y la forma del medidor */
    width: 100px;
    height: 100px;
    margin-bottom: 10px;
    border-radius: 50%;

    /* CAMBIO CLAVE: Círculo interior blanco (70%) cambia a color oscuro (#333) */
    background: 
        radial-gradient(closest-side, #333 70%, transparent 80% 100%), /* Círculo interior oscuro */
        conic-gradient(var(--c) calc(var(--p) * 1%), #444 0); /* Fondo de progreso restante un poco más oscuro */

    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: bold;
    font-size: 1.2em;
}

/* El valor del porcentaje ya usa el color dinámico (var(--c)), así que estará bien */
/* .gauge-percent-value { color: var(--c); } */


/* Estilo para el Medidor Global (más grande) */
.total-mesas-gauge {
    width: 140px;
    height: 140px;

    /* CAMBIO CLAVE: Círculo interior blanco (65%) cambia a color oscuro (#333) */
    background: 
        radial-gradient(closest-side, #333 65%, transparent 75% 100%), /* Círculo interior oscuro */
        conic-gradient(var(--c) calc(var(--p) * 1%), #444 0);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.gauge-center-percent {
    font-size: 2.2em;
    font-weight: bold;
    color: var(--c);
}

.gauge-center-label {
    font-size: 0.8em;
    font-weight: 500;
    color: #ccc; /* Etiqueta global en gris claro */
    margin-top: -5px;
}
/* --- POSICIONAMIENTO ESPECÍFICO PARA EL MODAL DE PORCENTAJES --- */

.ocupacion-modal {
    display: flex;
    align-items: flex-start; /* Alineamos al inicio (arriba) */
    justify-content: center;
    padding-top: 100px;       /* Margen superior general */
}

.ocupacion-modal .resumen-content {
    position: relative;      /* Necesario para usar top */
    max-width: 600px;
    max-height: 90vh;
    top: -80px;              /* Subirlo un poco hacia arriba */
}

/* Ajustes para pantallas pequeñas */
@media (max-width: 480px) {
    .ocupacion-modal .resumen-content {
        max-width: 90%;
        max-height: 85vh;
        top: -100px;           /* Subirlo un poco hacia arriba */
        transform: translateY(0);
    }
}



/* --- Definición de la Animación de Carga del Porcentaje --- */
@keyframes fill-gauge {
    from {
        /* Empezar la animación de progreso en 0% */
        --p: 0;
    }
}

/* --- Aplicar la Animación a los Medidores --- */
.area-gauge, .total-mesas-gauge {
    /* ... (otras propiedades de tamaño y fondo) ... */

    /* MODIFICACIÓN CLAVE: Aumentamos la duración a 5s para hacerlo lento */
    animation: fill-gauge 5s ease-out forwards; 
}

            const monto1 = parseFloat(datosMesa.montos[0]) || 0;

                const tragoComboHTML = index === 0 ? `
                    <div class="detail-row">

                    </div>
                    <div class="detail-row">

    /* =====================================================

      ===================================================== */
    const calcularResumenInventario = (data) => {
        const resumen = {
            tragos: {},
            combos: {}
        };

        for (const area in data) {
            for (const mesa in data[area]) {
                const datosMesa = data[area][mesa];

                // ===== VALIDACIONES =====
                const monto = datosMesa.montos?.[0];
                const fecha = datosMesa.fechas?.[0];

                const montoValido = monto !== "" && !isNaN(monto) && Number(monto) > 0;
                const fechaValida = fecha !== "" && fecha !== "12-25"; // ajusta si deseas otro filtro

                // ❌ Si no hay venta real, NO contar inventario
                if (!montoValido || !fechaValida) continue;

                // ===== TRAGOS =====
                const tragosStr = datosMesa.tragos?.[0];
                if (tragosStr) {
                    const tragosArray = tragosStr
                        .split(',')
                        .map(t => t.trim().toUpperCase())
                        .filter(Boolean);

                    tragosArray.forEach(trago => {
                        resumen.tragos[trago] = (resumen.tragos[trago] || 0) + 1;
                    });
                }

                // ===== COMBOS =====
                const comboStr = datosMesa.combo;
                if (comboStr) {
                    const comboKey = comboStr.trim().toUpperCase();
                    if (comboKey) {
                        resumen.combos[comboKey] = (resumen.combos[comboKey] || 0) + 1;
                    }
                }
            }
        }

        return resumen;
    };

        let totalTransferenciasMama = 0; // PACHA → MAMA
        let totalTransferenciasPacha = 0; // MAMA → PACHA
        const detalleTransferenciasMama = [];
        const detalleTransferenciasPacha = [];

        for (const area in data) {
            for (const mesa in data[area]) {
                const datosMesa = data[area][mesa];

                // Revisar si la mesa tiene combo PACHAMAMA
                const combo = datosMesa.combo ? datosMesa.combo.toLowerCase() : "";

                for (let i = 0; i < 2; i++) {
                    const nombre = datosMesa.nombres[i].trim().toUpperCase();
                    const montoStr = datosMesa.montos[i];
                    const monto = parseFloat(montoStr) || 0;

                    if (monto > 0) {
                        // Suma al total global
                        totalGlobal += monto;

                        // Registrar por cuenta destino
                        const clave = nombre || "SIN NOMBRE ASIGNADO";

                        if (resumenPorNombre[clave]) {
                            resumenPorNombre[clave].monto += monto;
                            resumenPorNombre[clave].transacciones.push({
                                area: area,
                                mesa: mesa,
                                monto: monto.toFixed(2),
                                fecha: datosMesa.fechas[i],
                                operacion: datosMesa.operaciones[i]
                            });
                        } else {
                            resumenPorNombre[clave] = {
                                monto: monto,
                                transacciones: [{
                                    area: area,
                                    mesa: mesa,
                                    monto: monto.toFixed(2),
                                    fecha: datosMesa.fechas[i],
                                    operacion: datosMesa.operaciones[i]
                                }]
                            };
                        }

                        // =====================================================
                        // TRANSFERENCIA DEL 50% PARA COMBO PACHAMAMA
                        // =====================================================
                        if (combo === "pachamama") {
                            if (nombre === "PACHA SUNSET") {
                                const porcentaje = monto * 0.50;
                                totalTransferenciasMama += porcentaje;
                                detalleTransferenciasMama.push({
                                    area: area,
                                    mesa: mesa,
                                    montoOriginal: monto,
                                    transferencia: porcentaje
                                });
                            } else if (nombre === "MAMA") {
                                const porcentaje = monto * 0.50;
                                totalTransferenciasPacha += porcentaje;
                                detalleTransferenciasPacha.push({
                                    area: area,
                                    mesa: mesa,
                                    montoOriginal: monto,
                                    transferencia: porcentaje
                                });
                            }
                        }
                    }
                }
            }
        }

        return {
            totalGlobal: totalGlobal.toFixed(2),
            porNombre: resumenPorNombre,
            mamaTransferencia: totalTransferenciasMama,
            mamaDetalle: detalleTransferenciasMama,
            pachaTransferencia: totalTransferenciasPacha,
            pachaDetalle: detalleTransferenciasPacha

                resumenPorArea[area] = {

                    porcentaje: (mesasArea > 0) ? ((ocupadasArea / mesasArea) * 100).toFixed(1) : 0
                };
            }

            return {

                    cuentasPorNombre[nombre].transacciones += 1;
                    cuentasPorNombre[nombre].total += monto;
                    cuentasPorNombre[nombre].detalles.push({ mesa: mesaLabel, monto: monto });

                    if (combo === "pachamama") {
                        const transferencia = monto * 0.5;
                        if (nombre === "PACHA SUNSET") {
                            transfMama.push({ mesa: mesaLabel, montoOriginal: monto, porcentaje: 50, transferencia });
                        } else if (nombre === "MAMA") {
                            transfPacha.push({ mesa: mesaLabel, montoOriginal: monto, porcentaje: 50, transferencia });
                        }
                    }
                }
            }
        }

        // 3) Construir array "cuentas" — SIEMPRE incluir PACHA SUNSET y MAMA aunque estén vacías
        const orden = ["PACHA SUNSET", "MAMA"];
        const otros = Object.keys(cuentasPorNombre).filter(n => !orden.includes(n));
        const ordenFinal = [...orden, ...otros];

        const cuentas = ordenFinal.map(nombre => {
            const datos = cuentasPorNombre[nombre];
            if (datos) {
                return {
                    nombre,
                    transacciones: datos.transacciones,
                    total: datos.total,
                    detalles: datos.detalles
                };
            }
            // Cuenta vacía con placeholder
            return {
                nombre,
                transacciones: 0,
                total: 0,
                detalles: [{ mesa: "Mesa 1", monto: 0 }]
            };
        });

        // 4) Totales y saldo final de PACHA SUNSET
        const totalIngresado = cuentas.reduce((s, c) => s + c.total, 0);
        const totalTransfMama = transfMama.reduce((s, t) => s + t.transferencia, 0);
        const totalTransfPacha = transfPacha.reduce((s, t) => s + t.transferencia, 0);
        const ingresadoPacha = (cuentasPorNombre["PACHA SUNSET"]?.total) || 0;
        const saldoPacha = ingresadoPacha - totalTransfMama + totalTransfPacha;

        // Si los detalles de transferencias están vacíos, usar placeholder
        const detallesMamaFinal = transfMama.length > 0
            ? transfMama
            : [{ mesa: "Mesa 1", montoOriginal: 0, porcentaje: 50, transferencia: 0 }];
        const detallesPachaFinal = transfPacha.length > 0
            ? transfPacha
            : [{ mesa: "Mesa 1", montoOriginal: 0, porcentaje: 50, transferencia: 0 }];

        return {
            fecha: fechaReporte,
            resumen: { titulo: "Detalle de Ingresos por Cuenta Destino" },
            cuentas,
            totales: { ingresado: totalIngresado },
            transferencias: {
                mama: {
                    descripcion: "Transferencias a MAMA (50% del combo Pachamama)",
                    totalTransferido: totalTransfMama,
                    detalles: detallesMamaFinal
                },
                pacha: {
                    descripcion: "Transferencias a PACHA SUNSET",
                    totalTransferido: totalTransfPacha,
                    detalles: detallesPachaFinal
                }
            },
            saldoFinal: {
                descripcion: "Cuenta PACHA SUNSET — Detalle del saldo actual",
                ingresado: ingresadoPacha,
                transferenciasEnviadas: totalTransfMama,
                transferenciasRecibidas: totalTransfPacha,
                formula: `${ingresadoPacha} - ${totalTransfMama} + ${totalTransfPacha}`,
                saldo: saldoPacha,
                banco: "BCP",
                cuenta: "20151595559307",
                referencia: "Ventas de mesas",
                nota: "Datos generados automáticamente"
            }
        };
    };

    // Formateador personalizado: igual al estilo de los reportes originales
    // (objetos pequeños en una sola línea, ej: { "mesa": "Pacha 1", "monto": 800 })
    const formatReporte = (r) => {
        const j = JSON.stringify;
        const detalleCuenta  = (d) => `      { "mesa": ${j(d.mesa)}, "monto": ${d.monto} }`;
        const detalleTransf  = (d) => `      { "mesa": ${j(d.mesa)}, "montoOriginal": ${d.montoOriginal}, "porcentaje": ${d.porcentaje}, "transferencia": ${d.transferencia} }`;

        const cuentaBlock = (c) => {
            const det = c.detalles.map(detalleCuenta).join(",\n");
            return [
                `  {`,
                `    "nombre": ${j(c.nombre)},`,
                `    "transacciones": ${c.transacciones},`,
                `    "total": ${c.total},`,
                `    "detalles": [`,
                det,
                `    ]`,
                `  }`
            ].join("\n");
        };

        const transfBlock = (key, t) => {
            const det = t.detalles.map(detalleTransf).join(",\n");
            return [
                `    ${j(key)}: {`,
                `      "descripcion": ${j(t.descripcion)},`,
                `      "totalTransferido": ${t.totalTransferido},`,
                `      "detalles": [`,
                det,
                `      ]`,
                `    }`
            ].join("\n");
        };

        const sf = r.saldoFinal;
        const saldoBlock = [
            `  "saldoFinal": {`,
            `    "descripcion": ${j(sf.descripcion)},`,
            `    "ingresado": ${sf.ingresado},`,
            `    "transferenciasEnviadas": ${sf.transferenciasEnviadas},`,
            `    "transferenciasRecibidas": ${sf.transferenciasRecibidas},`,
            `    "formula": ${j(sf.formula)},`,
            `    "saldo": ${sf.saldo},`,
            `    "banco": ${j(sf.banco)},`,
            `    "cuenta": ${j(sf.cuenta)},`,
            `    "referencia": ${j(sf.referencia)},`,
            `    "nota": ${j(sf.nota)}`,
            `  }`
        ].join("\n");

        return [
            `{`,
            `  "fecha": ${j(r.fecha)},`,
            `  "resumen": { "titulo": ${j(r.resumen.titulo)} },`,
            `  "cuentas": [`,
            r.cuentas.map(cuentaBlock).join(",\n"),
            `  ],`,
            `  "totales": { "ingresado": ${r.totales.ingresado} },`,
            `  "transferencias": {`,
            transfBlock("mama",  r.transferencias.mama)  + ",",
            transfBlock("pacha", r.transferencias.pacha),
            `  },`,
            saldoBlock,
            `}`
        ].join("\n");
    };

    // Generar y mostrar en consola al cargar la página
    const reporteDelDia = generarReporteJSON(mesaData);
    const reporteJSONString = formatReporte(reporteDelDia);

    console.log("%c═══════════════════════════════════════════════════════", "color:#00ff88;font-weight:bold");
    console.log("%c  📋 REPORTE DEL DÍA (" + reporteDelDia.fecha + ") — listo para copiar", "color:#00ff88;font-weight:bold;font-size:14px");
    console.log("%c  Pégalo dentro del array REPORTES_DATA.reportes", "color:#00ff88");
    console.log("%c  Atajo: ejecuta  copiarReporte()  para copiarlo al portapapeles", "color:#ffcc00");
    console.log("%c═══════════════════════════════════════════════════════", "color:#00ff88;font-weight:bold");
    console.log(reporteJSONString);
    console.log("%c═══════════════════════════════════════════════════════", "color:#00ff88;font-weight:bold");

    // Exponer helpers globales para usar desde la consola
    window.reporteDelDia = reporteDelDia;
    window.copiarReporte = async () => {
        try {
            await navigator.clipboard.writeText(reporteJSONString);
            console.log("%c✅ Reporte copiado al portapapeles", "color:#00ff88;font-weight:bold");
        } catch (err) {
            console.warn("No se pudo copiar automáticamente. Selecciona el JSON de arriba y cópialo manualmente.", err);
        }
    };
    window.descargarReporte = () => {
        const blob = new Blob([reporteJSONString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `reporte-${reporteDelDia.fecha}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

});

// ACCORDION
// ===================================
function setupAccordionLogic() {
    const headers = document.querySelectorAll('.accordion-header');

    headers.forEach(header => {
        header.addEventListener('click', () => {
            const targetId = header.getAttribute('data-target');
            const content = document.getElementById(targetId);
            const icon = header.querySelector('.toggle-icon');

            if (!content) return;

            if (content.style.maxHeight) {
                content.style.maxHeight = null;
                if (icon) icon.textContent = '+';
            } else {
                content.style.maxHeight = "3000px";
                if (icon) icon.textContent = '–';
            }
        });
    });
}
        function renderReporte(data, rIndex) {

            const mainContentId = `main-report-content-${rIndex}`;
            const reportContainerId = `reporte-container-${rIndex}`; 

            const s = data.saldoFinal || {};

            const ingresado = s.ingresado || 0;
            const transferenciasEnviadas = s.transferenciasEnviadas || 0;
            const transferenciasRecibidas = s.transferenciasRecibidas || 0;

            const formula = `${ingresado.toLocaleString('es-BO')} - ${transferenciasEnviadas.toLocaleString('es-BO')} + ${transferenciasRecibidas.toLocaleString('es-BO')}`;

            let html = `
            <div id="${reportContainerId}" class="reporte-printable-area">


                <div class="ticket-section accordion-item main-report-accordion">
                    <h3 class="accordion-header main-header" data-target="${mainContentId}">
                        Reporte ${data.fecha}
                        <span class="toggle-icon">+</span>
                    </h3>

                    <div id="${mainContentId}" class="accordion-content">
            `;

            // ================= CUENTAS =================
            data.cuentas
                .filter(cuenta => cuenta.transacciones > 0 && cuenta.total > 0)
                .forEach((cuenta, cIndex) => {

                    const contentId = `details-${rIndex}-${cIndex}`;

                    html += `
                    <div class="inner-accordion-item">
                        <h4 class="accordion-header inner-header" data-target="${contentId}">
                            Cuenta: ${cuenta.nombre} (${cuenta.transacciones} transacciones)
                            <span class="toggle-icon">+</span>
                        </h4>

                        <div id="${contentId}" class="accordion-content">
                            <p><strong>Total: Bs. ${cuenta.total.toLocaleString('es-BO')}</strong></p>

                            <ul class="ticket-grid-list">
                                ${cuenta.detalles.map(d => `
                                    <li>
                                        <span class="mesa">${d.mesa}</span>
                                        <span class="monto">Bs. ${d.monto.toLocaleString('es-BO')}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                    `;
                });

            // ================= TRANSFERENCIAS =================
            if (data.transferencias) {
                ['mama', 'pacha'].forEach(tipo => {

                    const tData = data.transferencias[tipo];

                    if (tData?.detalles?.length && tData.totalTransferido > 0) {

                        const transferId = `transfer-${tipo}-${rIndex}`;

                        html += `
                        <div class="ticket-section transfer inner-section accordion-item">
                            <h4 class="accordion-header inner-header" data-target="${transferId}">
                                ${tData.descripcion || `Transferencias a ${tipo.toUpperCase()}`}
                                <span class="toggle-icon">+</span>
                            </h4>

                            <div id="${transferId}" class="accordion-content">
                                <p class="total-transfer">
                                    Total a transferir:
                                    <strong>Bs. ${tData.totalTransferido.toLocaleString('es-BO')}</strong>
                                </p>

                                <ul class="ticket-simple-list">
                                    ${tData.detalles.map(t => `
                                        <li class="transfer-item">
                                            <div class="transfer-left">
                                                <span class="transfer-mesa">${t.mesa}</span>
                                                <span class="transfer-detalle">
                                                    ${t.porcentaje}% de Bs. ${t.montoOriginal.toLocaleString('es-BO')}
                                                </span>
                                            </div>
                                            <div class="transfer-right">
                                                <span class="transfer-label">Transferir:</span>
                                                <span class="transfer-monto">
                                                    Bs. ${t.transferencia.toLocaleString('es-BO')}
                                                </span>
                                            </div>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                        `;
                    }
                });
            }

            // ================= SALDO FINAL =================
            const finalId = `final-saldo-${rIndex}`;

            html += `
                <div class="ticket-section final inner-section accordion-item">
                    <h4 class="accordion-header inner-header" data-target="${finalId}">
                        ${s.descripcion || 'Cierre de Caja / Saldo Final'}
                        <span class="toggle-icon">+</span>
                    </h4>

                    <div id="${finalId}" class="accordion-content">
                        <div class="fila-saldo">
                            <span>Total Ingresado:</span>
                            <strong>Bs. ${ingresado.toLocaleString('es-BO')}</strong>
                        </div>

                        <div class="fila-saldo">
                            <span>Trans. realizadas a Mama:</span>
                            <span>Bs. ${transferenciasEnviadas.toLocaleString('es-BO')}</span>
                        </div>

                        <div class="fila-saldo">
                            <span>Trans. recibidas de Mama:</span>
                            <span>Bs. ${transferenciasRecibidas.toLocaleString('es-BO')}</span>
                        </div>

                        <hr>
                        <p><strong>Cálculo:</strong> ${formula}</p>
                        <hr>

                        <div class="saldo-destacado">
                            <p><strong>SALDO ACTUAL EN BANCO</strong></p>
                            <p class="monto-final">Bs. ${s.saldo.toLocaleString('es-BO')}</p>
                        </div>
                    </div>
                </div>

                </div> <!-- FIN accordion-content principal -->
                </div> <!-- FIN main-report-accordion -->
            </div> <!-- FIN reporte-printable-area -->
            `;

            return html;
        }

        function obtenerMesAnio(fecha) {
            const [dia, mes, anioCorto] = fecha.split('-');
            const anio = `20${anioCorto}`;

            const meses = [
                "ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO",
                "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"
            ];

            const nombreMes = meses[parseInt(mes, 10) - 1];
            return `${nombreMes} ${anio}`;
        }

           function renderReportes(data) {
               const reportesAplanados = data.reportes.flat();
               let html = '';
               let ultimoMesAnio = null;

               reportesAplanados.forEach((reporte, index) => {

                   const mesAnioActual = obtenerMesAnio(reporte.fecha);

                   // 👉 Si cambia el mes, cerramos el anterior y abrimos uno nuevo
                   if (ultimoMesAnio !== mesAnioActual) {

                       if (ultimoMesAnio !== null) {
                           html += `</div></div>`; // cerrar mes anterior
                       }

                       html += `
                           <div class="mes-acordeon">
                               <div class="separador-mes" data-mes>
                                   <span>${mesAnioActual}</span>
                               </div>
                               <div class="mes-contenido">
                       `;

                       ultimoMesAnio = mesAnioActual;
                   }

                   // 🔒 filtros
                   if (!reporte.cuentas || reporte.cuentas.length === 0) return;

                   const tieneIngresos = reporte.cuentas.some(c => c.total > 0);
                   if (!tieneIngresos) return;

                   html += renderReporte(reporte, index);
               });

               // cerrar último mes
               if (ultimoMesAnio !== null) {
                   html += `</div></div>`;
               }

               contenidoReportes.innerHTML = html;
               activarAcordionMeses();
               setupAccordionLogic();
           }
           function activarAcordionMeses() {
               document.querySelectorAll('[data-mes]').forEach(header => {
                   header.addEventListener('click', () => {
                       const contenido = header.nextElementSibling;
                       header.classList.toggle('abierto');
                       contenido.classList.toggle('abierto');
                   });
               });
           }
